<header>
    <div class="site-id">
        <h1><a href="../index.html"><img src="https://emojigraph.org/media/apple/teacup-without-handle_1f375.png"
                    alt="Tea" width="30" height="30"></a></h1>
    </div>
    <nav class="site-nav">
        <ul>
            <li><a class="header" href="../about/index.html">ABOUT</a></li>
            <li><a class="header" href="../menu/index.html">MENU</a></li>
            <li><a class="header" href="../services/index.html">SERVICES & DIRECTORY</a></li>
        </ul>
    </nav>
</header>

<body>

    <main>
        <div class="container food">
            <h1>ALL DAY BREAKFAST</h1>
            <div class="centered-content">
                <div class="dietary-icons-food">
                    <h2 class="icons-title">Dietary Icons</h2>
                    <p>Spice Level</p>
                    <ul>
                        <li>Normal</li>
                        <li>Mild</li>
                        <li>Hot</li>
                    </ul>
                    <p>Allergen</p>
                    <ul>
                        <li>Nuts</li>
                        <li>Milk</li>
                        <li>Egg</li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="container">
            <section class="toast-grid">
                <div class="card">
                    <img src="../img/all-day-breakfast/beef-tapa.png" alt="toast">
                    <p>BEEF TAPA</p>
                    <div>
                        <span class="food-dot egg"></span>
                    </div>
                </div>

                <div class="card">
                    <img src="../img/all-day-breakfast/bangus.png" alt="toast">
                    <p>BONELESS BANGUS</p>
                    <div>
                        <span class="food-dot egg"></span>
                    </div>
                </div>

                <div class="card">
                    <img src="../img/all-day-breakfast/corned-beef.png" alt="toast">
                    <p>CORNED BEEF HASH</p>
                    <div>
                        <span class="food-dot egg"></span>
                    </div>
                </div>

                <div class="card">
                    <img src="../img/all-day-breakfast/inasal-tapa.png" alt="toast">
                    <p>INASAL TAPA</p>
                    <div>
                        <span class="food-dot egg"></span>
                    </div>
                </div>

                <div class="card">
                    <img src="../img/all-day-breakfast/longganisa.png" alt="toast">
                    <p>HOMEMADE LONGGANISA</p>
                    <div>
                        <span class="food-dot egg"></span>
                        <span class="food-dot nut"></span>
                    </div>
                </div>

                <div class="card">
                    <img src="../img/all-day-breakfast/tocino.png" alt="toast">
                    <p>PORK TOCINO</p>
                    <div>
                        <span class="food-dot egg"></span>
                    </div>
                </div>


                <!-- repeat for all 9 items -->
            </section>
        </div>

        <hr>
    </main>

    <footer>
        <h1>Your neighborhood cafe.</h1>

        <h2>Send us a message!</h2>
        <form class="contact-form" action="#" method="post">

            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your name" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Your email" required>

            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" placeholder="Your message..." required></textarea>

            <button type="submit">Send Message</button>

        </form>
    </footer>





</body>

</html>
